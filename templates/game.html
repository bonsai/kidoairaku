<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演技力採点 - 喜怒哀楽</title>
    <!-- Critical CSS: 最初の描画に必要なスタイルをインライン化 -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
            background: linear-gradient(135deg, #fff9e6 0%, #fff3cc 50%, #ffe680 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 30px 25px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(255, 230, 0, 0.3);
            text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 8px; color: #b8860b; font-weight: 700; }
        .subtitle { color: #a0522d; margin-bottom: 25px; font-size: 13px; }
        .coin-display { font-size: 24px; color: #b8860b; font-weight: bold; margin: 20px 0; padding: 15px; background: rgba(255, 215, 0, 0.2); border-radius: 15px; border: 2px solid #ffd700; }
        .game-info { display: flex; justify-content: space-around; margin: 30px 0; gap: 20px; }
        .target-emotion, .timer { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; min-width: 150px; }
        .target-label, .timer-label { font-size: 14px; opacity: 0.8; margin-bottom: 10px; }
        .target-display, .timer-display { font-size: 48px; font-weight: bold; margin: 10px 0; }
        .target-emoji, .timer-unit { font-size: 24px; }
        .timer-display { color: #ff6b6b; }
        #gameCameraArea { display: none; position: relative; margin: 20px auto; max-width: 600px; }
        #gameCameraArea.show { display: block; }
        #gameCameraPreview { width: 100%; border-radius: 15px; }
        .overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .detection-result { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 15px 30px; border-radius: 10px; text-align: center; min-width: 200px; }
        .detected-emotion { font-size: 32px; font-weight: bold; }
        .detected-emoji { font-size: 48px; margin: 10px 0; }
        .match-status { font-size: 18px; padding: 5px 15px; border-radius: 20px; display: inline-block; }
        .match-status.match { background: #00b894; color: white; }
        .match-status.no-match { background: #e17055; color: white; }
        .sns-icons { display: flex; justify-content: center; gap: 15px; margin: 30px 0; flex-wrap: wrap; }
        .sns-icon { display: inline-block; padding: 10px 20px; border-radius: 25px; color: white; text-decoration: none; font-weight: bold; font-size: 14px; }
        .sns-icon.twitter { background: #1DA1F2; }
        .sns-icon.pixiv { background: #0096FA; }
        .sns-icon.instagram { background: linear-gradient(45deg, #405DE6, #5851DB, #833AB4, #C13584, #E1306C, #FD1D1D); }
        .sns-icon.youtube { background: #FF0000; }
        .result-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255, 249, 230, 0.95) 0%, rgba(255, 243, 204, 0.98) 100%); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .result-overlay.show { display: flex; }
        .score-number { font-size: 72px; font-weight: bold; color: #fdcb6e; }
        .score-rank { font-size: 48px; margin: 10px 0; }
        .score-comment { font-size: 18px; line-height: 1.6; margin: 20px 0; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        .retry-btn { background: rgba(255, 255, 255, 0.9); color: #b8860b; border: 2px solid #ffd700; padding: 14px 35px; font-size: 17px; border-radius: 50px; cursor: pointer; margin-top: 20px; font-weight: 700; }
        .retry-btn:hover { background: white; transform: translateY(-3px); }
    </style>
    <!-- 非クリティカル CSS は遅延ロード -->
    <link rel="preload" href="{{ url_for('static', filename='game.css') }}" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <noscript><link rel="stylesheet" href="{{ url_for('static', filename='game.css') }}"></noscript>
</head>
<body>
    <div class="container" id="gameContainer">
        <h1>演技力採点ゲーム</h1>
        <p class="subtitle">30秒で表情を維持して採点！</p>

        <div class="coin-display" id="totalCoins">
            💰 <span id="coinCount">0</span> コイン
        </div>

        <div class="game-info">
            <div class="target-emotion">
                <div class="target-label">目標表情</div>
                <div class="target-display" id="targetEmotion">-</div>
                <div class="target-emoji" id="targetEmoji">😐</div>
            </div>
            <div class="timer">
                <div class="timer-label">残り時間</div>
                <div class="timer-display" id="timer">30</div>
                <div class="timer-unit">秒</div>
            </div>
        </div>

        <div class="camera-area" id="gameCameraArea">
            <video id="gameCameraPreview" autoplay playsinline></video>
            <canvas id="overlayCanvas" class="overlay-canvas"></canvas>
            <div class="detection-result" id="detectionResult">
                <div class="detected-emotion" id="detectedEmotion">-</div>
                <div class="detected-emoji" id="detectedEmoji">😐</div>
                <div class="match-status" id="matchStatus">待機中</div>
            </div>
        </div>

        <div class="sns-icons">
            <a href="https://twitter.com/intent/tweet?text=喜怒哀楽で演技力採点！&url=https://kidoairaku.onrender.com" target="_blank" class="sns-icon twitter">Twitter</a>
            <a href="#" class="sns-icon pixiv">Pixiv</a>
            <a href="#" class="sns-icon instagram">Insta</a>
            <a href="#" class="sns-icon youtube">YouTube</a>
        </div>

        <canvas id="gameCaptureCanvas" style="display:none;"></canvas>

        <div class="game-stats" id="gameStats">
            <div class="stat-item">
                <div class="stat-label">合致回数</div>
                <div class="stat-value" id="matchCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">検出回数</div>
                <div class="stat-value" id="detectCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">合致率</div>
                <div class="stat-value" id="matchRate">0%</div>
            </div>
        </div>

        <div class="result-overlay" id="gameResultOverlay">
            <h2>演技力結果</h2>
            <div class="score-display">
                <div class="score-number" id="scoreNumber">-</div>
                <div class="score-rank" id="scoreRank">-</div>
            </div>
            <div class="score-comment" id="scoreComment"></div>
            <div class="highlights" id="highlights"></div>
            <button class="retry-btn" onclick="location.reload()">もう一度</button>
            <button class="retry-btn" onclick="window.location.href='/'">トップに戻る</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='game.js') }}"></script>
    <!-- Service Worker でキャッシュ有効化 -->
    <script src="{{ url_for('static', filename='cache.js') }}"></script>
</body>
</html>
