<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喜怒哀楽 - 演技でお金稼ぎ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" id="mainContainer">
        <h1>喜怒哀楽</h1>
        <p class="subtitle">演技でお金を稼ごう！</p>
        <button class="start-btn" onclick="startGame()">ゲームスタート</button>
        <div class="coin-display" id="totalCoins">
            💰 <span id="coinCount">0</span> コイン
        </div>
    </div>

    <script>
    function startGame() {
        const hasSeenOnboarding = localStorage.getItem('kidoairaku_onboarding');
        if (!hasSeenOnboarding) {
            window.location.href = '/onboarding';
        } else {
            window.location.href = '/game';
        }
    }

    // コイン表示
    function updateCoinDisplay() {
        const coins = parseInt(localStorage.getItem('kidoairaku_coins') || '0');
        document.getElementById('coinCount').textContent = coins;
    }
    updateCoinDisplay();
    </script>
</body>
</html>
