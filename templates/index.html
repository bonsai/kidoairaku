<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喜怒哀楽 - 表情判定</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- 背景の飾り -->
    <div style="position: fixed; top: -50px; left: -50px; font-size: 40px; opacity: 0.2; animation: floatSakura 8s ease-in-out infinite;">🎉</div>
    <div style="position: fixed; top: 20%; right: -30px; font-size: 30px; opacity: 0.15; animation: floatSakura 6s ease-in-out infinite 1s;">😊</div>
    <div style="position: fixed; bottom: 10%; left: 5%; font-size: 35px; opacity: 0.18; animation: floatSakura 7s ease-in-out infinite 2s;">🎊</div>
    <div style="position: fixed; bottom: -40px; right: 30%; font-size: 45px; opacity: 0.15; animation: floatSakura 9s ease-in-out infinite 3s;">🎉</div>

    <div class="container" id="mainContainer">
        <h1>喜怒哀楽</h1>
        <p class="subtitle">カメラで表情を判定・絵文字が変わる</p>

        <button class="start-btn" id="startBtn" onclick="startCamera()">カメラを起動</button>

        <div class="camera-area" id="cameraArea">
            <video id="cameraPreview" autoplay playsinline></video>
            <button class="switch-btn" onclick="switchCamera()">切替</button>
            <div class="capture-btn" onclick="capture()"></div>
        </div>

        <canvas id="captureCanvas" style="display:none;"></canvas>
    </div>

    <!-- ローディング画面 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="emoji-beat" id="loadingEmoji">😐</div>
        <div class="loading-text" id="loadingText">診断中…</div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <!-- 結果画面 -->
    <div class="result-overlay" id="resultOverlay">
        <div style="font-size: 60px; margin-bottom: 20px; animation: floatSakura 2s ease-in-out infinite;" id="resultEmoji">😐</div>
        <div class="result-emotion" id="resultEmotion">-</div>
        <div class="result-text">の表情です</div>
        <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
            <button class="retry-btn" onclick="retry()">もう一度</button>
            <button class="retry-btn" onclick="shareTwitter()" style="background: #1DA1F2; border-color: #1DA1F2;">Twitterでシェア</button>
            <button class="retry-btn" onclick="copyResult()" style="background: #6c5ce7; border-color: #6c5ce7;">コピー</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
