<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モヘジモード - 喜怒哀楽</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='moheji.css') }}">
</head>
<body>
    <div class="container" id="mohejiContainer">
        <h1>ヘノヘノモヘジ</h1>
        <p class="subtitle">リアルタイムでモヘジを重ね合わせ</p>

        <div class="camera-area" id="mohejiCameraArea">
            <video id="mohejiCameraPreview" autoplay playsinline></video>
            <canvas id="mohejiOverlayCanvas" class="moheji-overlay-canvas"></canvas>
            <div class="moheji-status" id="mohejiStatus">検出中...</div>
        </div>

        <button class="retry-btn" onclick="window.location.href='/'">トップに戻る</button>
    </div>

    <script src="{{ url_for('static', filename='moheji.js') }}"></script>
</body>
</html>
